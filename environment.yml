name: chelif-drought
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip
  - numpy=1.26.4
  - pandas=2.2.2
  - scipy=1.13.1
  - statsmodels=0.14.2
  - scikit-learn=1.5.0
  - matplotlib=3.9.0
  - seaborn=0.13.2
  - xarray=2024.6.0
  - netCDF4=1.6.5
  - cftime=1.6.4
  - cfgrib=0.9.10.4
  - eccodes=1.7.0
  - rasterio=1.3.10
  - geopandas=1.0.1
  - shapely=2.0.4
  - pyproj=3.6.1
  - jupyter=1.0.0
  - notebook=7.2.1
  - nbconvert=7.16.4
  - ipykernel=6.29.4
  - pip:
      - climate-indices==2.0.0
      - cdsapi==0.7.0

# Notes
# -----
# 1. The R side (M1, M2, M3, E7, R12) requires R >= 4.3 with the packages
#    listed in environment/R_sessionInfo.txt.
# 2. The scPDSI R compute step calls climate_indices through reticulate;
#    the conda environment is therefore usable for the R bridge as well.
# 3. Set CHELIF_PROJECT_ROOT to point at the local data root before
#    running any data-loading script.
